name: Auto-merge Copilot PRs

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: |
      github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
      contains(github.event.pull_request.title, '[auto-sync]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for CI checks
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          pr_number=${{ github.event.pull_request.number }}
          echo "Waiting for CI checks on PR #$pr_number..."
          max_attempts=30
          for i in $(seq 1 $max_attempts); do
            sleep 30
            status=$(gh pr checks "$pr_number" --repo "${{ github.repository }}" \
              --json name,state \
              --jq '[.[] | select(.name != "Auto-merge Copilot PRs")] |
                if length == 0 then "pass"
                elif all(.state == "SUCCESS" or .state == "SKIPPED") then "pass"
                elif any(.state == "FAILURE") then "fail"
                else "pending" end' 2>/dev/null || echo "pending")
            echo "Attempt $i/$max_attempts: $status"
            if [ "$status" = "pass" ]; then
              echo "All checks passed!"
              break
            elif [ "$status" = "fail" ]; then
              echo "CI failed. Skipping auto-merge."
              exit 0
            fi
          done

      - name: Approve and merge
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          pr_number=${{ github.event.pull_request.number }}
          echo "Approving and merging PR #$pr_number..."
          gh pr review "$pr_number" --repo "${{ github.repository }}" --approve
          gh pr merge "$pr_number" --repo "${{ github.repository }}" --squash \
            --subject "sync: update from Docs [automated]"
