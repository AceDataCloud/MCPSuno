name: Sync from Docs

on:
  repository_dispatch:
    types: [docs-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  create-sync-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout Docs repo
        uses: actions/checkout@v4
        with:
          repository: AceDataCloud/Docs
          path: _docs
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Extract Docs source of truth
        id: docs
        run: |
          cd _docs

          # 1. Extract model enum from OpenAPI spec
          models="(not found)"
          if [ -f openapi/suno.json ]; then
            models=$(python3 -c "
          import json
          with open('openapi/suno.json') as f:
              spec = json.load(f)
          for path, methods in spec.get('paths', {}).items():
              for method, op in methods.items():
                  rb = op.get('requestBody', {})
                  for ct, mt in rb.get('content', {}).items():
                      props = mt.get('schema', {}).get('properties', {})
                      if 'model' in props:
                          for m in props['model'].get('enum', []):
                              print(m)
          " 2>/dev/null | sort -u | tr '\n' ', ' | sed 's/,$//')
          fi

          # 2. Extract API endpoints
          endpoints="(not found)"
          if [ -f openapi/suno.json ]; then
            endpoints=$(python3 -c "
          import json
          with open('openapi/suno.json') as f:
              spec = json.load(f)
          for path, methods in spec.get('paths', {}).items():
              for method, op in methods.items():
                  summary = op.get('summary', '')
                  print(f'{method.upper()} {path} — {summary}')
          " 2>/dev/null)
          fi

          # 3. Last commit info
          commit_info=$(git log -1 --pretty=format:"%h %s" 2>/dev/null || echo "unknown")

          # Save to files for issue body
          echo "$models" > /tmp/models.txt
          echo "$endpoints" > /tmp/endpoints.txt
          echo "$commit_info" > /tmp/commit_info.txt

      - name: Check for existing open sync issue
        id: existing
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --label "auto-sync" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=$existing" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync issue
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          models=$(cat /tmp/models.txt)
          endpoints=$(cat /tmp/endpoints.txt)
          commit_info=$(cat /tmp/commit_info.txt)

          gh issue create \
            --title "sync: update from Docs ($commit_info)" \
            --label "auto-sync" \
            --body "$(cat <<EOF
          @claude

          The upstream Docs have been updated. Make sure this MCP server is in sync with the latest API spec.

          ## Source of Truth

          The Docs OpenAPI spec defines these **models** for Suno:

          \`\`\`
          $models
          \`\`\`

          And these **endpoints**:

          \`\`\`
          $endpoints
          \`\`\`

          ## What to Do

          1. Compare the models above against \`core/types.py\` (the \`SunoModel\` Literal). Add any missing models, remove any that are no longer in the spec.
          2. Compare the endpoints above against the tools in \`tools/\`. Add tools for new endpoints if needed.
          3. Update \`README.md\` model table if the model list changed.
          4. If nothing needs changing, just close this issue with a comment.
          5. If changes are needed, create a PR.
          EOF
          )"

      - name: Update existing issue
        if: steps.existing.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          models=$(cat /tmp/models.txt)
          commit_info=$(cat /tmp/commit_info.txt)

          gh issue comment "${{ steps.existing.outputs.issue_number }}" \
            --body "$(cat <<EOF
          @claude

          Docs updated again ($commit_info). Current model list from OpenAPI spec:

          \`\`\`
          $models
          \`\`\`

          Please re-check and sync if needed.
          EOF
          )"
